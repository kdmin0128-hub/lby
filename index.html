<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사이다를 지켜라! (Cider Defense)</title>
<style>
body {
margin: 0;
background-color: #1a1a1a;
font-family: 'Malgun Gothic', sans-serif;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
overflow: hidden;
user-select: none;
}
#gameContainer {
position: relative;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
canvas {
background-color: #22B14C; /* 청량한 사이다 초록색 /
display: block;
border-radius: 8px;
}
/ 모바일용 터치 버튼 */
.controls {
display: flex;
justify-content: space-between;
width: 100%;
max-width: 480px;
margin-top: 15px;
padding: 0 10px;
box-sizing: border-box;
}
.btn {
width: 45%;
height: 60px;
background-color: #333;
color: white;
border: none;
border-radius: 10px;
font-size: 24px;
font-weight: bold;
cursor: pointer;
touch-action: manipulation;
}
.btn:active {
background-color: #555;
}
</style>
</head>
<body>

<div id="gameContainer">
<canvas id="gameCanvas" width="480" height="640"></canvas>
</div>

<div class="controls">
<button class="btn" id="leftBtn">◀</button>
<button class="btn" id="rightBtn">▶</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 게임 상태
let player = { x: 210, y: 530, width: 60, height: 90, speed: 8 };
let carbonation = 100;
let score = 0;
let objects = [];
let spawnTimer = 0;
let gameOver = false;

// 키 입력 상태
let keys = { Left: false, Right: false };

// 키보드 이벤트 리스너
window.addEventListener("keydown", (e) => {
if (e.key === "ArrowLeft") keys.Left = true;
if (e.key === "ArrowRight") keys.Right = true;
});
window.addEventListener("keyup", (e) => {
if (e.key === "ArrowLeft") keys.Left = false;
if (e.key === "ArrowRight") keys.Right = false;
});

// 모바일 터치 이벤트 리스너
const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");

leftBtn.addEventListener("touchstart", (e) => { e.preventDefault(); keys.Left = true; });
leftBtn.addEventListener("touchend", () => keys.Left = false);
rightBtn.addEventListener("touchstart", (e) => { e.preventDefault(); keys.Right = true; });
rightBtn.addEventListener("touchend", () => keys.Right = false);

// 마우스 클릭도 지원 (테스트용)
leftBtn.addEventListener("mousedown", () => keys.Left = true);
leftBtn.addEventListener("mouseup", () => keys.Left = false);
rightBtn.addEventListener("mousedown", () => keys.Right = true);
rightBtn.addEventListener("mouseup", () => keys.Right = false);

// 오브젝트 스폰 함수 (0: 멘토스, 1: 기포)
function spawnObject() {
let type = Math.random() < 0.4 ? 0 : 1;
let x = Math.random() * (canvas.width - 30);
let y = -30;
let speed = 4 + Math.random() * 4;
objects.push({ x, y, speed, type });
}

// 재시작 함수
function resetGame() {
player.x = canvas.width / 2 - player.width / 2;
carbonation = 100;
score = 0;
objects = [];
spawnTimer = 0;
gameOver = false;
update();
}

// 캔버스 클릭 시 재시작 판정
canvas.addEventListener("click", () => {
if (gameOver) resetGame();
});

// 메인 게임 루프
function update() {
if (gameOver) return;

// 1. 탄산 감소 로직 (프레임당 일정량 감소)
carbonation -= 0.15;
if (carbonation <= 0) {
carbonation = 0;
gameOver = true;
}

// 2. 플레이어 이동
if (keys.Left && player.x > 0) player.x -= player.speed;
if (keys.Right && player.x < canvas.width - player.width) player.x += player.speed;

// 3. 오브젝트 생성
spawnTimer++;
if (spawnTimer > 22) {
spawnObject();
spawnTimer = 0;
}

// 4. 오브젝트 이동 및 충돌 검사
for (let i = objects.length - 1; i >= 0; i--) {
let obj = objects[i];
obj.y += obj.speed;

// 화면 밖으로 나가면 삭제
if (obj.y > canvas.height) {
objects.splice(i, 1);
continue;
}

// 충돌 판정 (Rect vs Rect 단순화)
if (obj.x < player.x + player.width &&
obj.x + 30 > player.x &&
obj.y < player.y + player.height &&
obj.y + 30 > player.y) {

if (obj.type === 0) { // 멘토스 폭발!
carbonation -= 30;
if (carbonation < 0) carbonation = 0;
} else { // 탄산 기포 흡수!
carbonation += 15;
if (carbonation > 100) carbonation = 100;
score += 10;
}
objects.splice(i, 1);
}
}

// 5. 그리기 작업
ctx.clearRect(0, 0, canvas.width, canvas.height);

// 플레이어 (사이다 캔) 그리기
ctx.fillStyle = "#FFFFFF";
ctx.beginPath();
ctx.roundRect(player.x, player.y, player.width, player.height, 10);
ctx.fill();
// 캔 뚜껑 선
ctx.strokeStyle = "#CCCCCC";
ctx.lineWidth = 5;
ctx.beginPath();
ctx.moveTo(player.x, player.y + 15);
ctx.lineTo(player.x + player.width, player.y + 15);
ctx.stroke();

// 떨어지는 오브젝트 그리기
objects.forEach(obj => {
ctx.beginPath();
if (obj.type === 0) { // 멘토스
ctx.arc(obj.x + 15, obj.y + 15, 15, 0, Math.PI * 2);
ctx.fillStyle = "#F0F0F0";
ctx.fill();
ctx.strokeStyle = "#000000";
ctx.lineWidth = 2;
ctx.stroke();
} else { // 기포
ctx.arc(obj.x + 15, obj.y + 15, 10, 0, Math.PI * 2);
ctx.fillStyle = "#FFF200";
ctx.fill();
}
});

// UI 그리기
ctx.fillStyle = "#FFFFFF";
ctx.font = "bold 24px 'Malgun Gothic'";
ctx.fillText(SCORE: ${score}`, 20, 40);
ctx.fillText("CARBONATION:", 20, 80);

// 탄산 게이지 바
ctx.strokeStyle = "#000000";
ctx.lineWidth = 2;
ctx.strokeRect(210, 62, 200, 20);

if (carbonation > 0) {
ctx.fillStyle = carbonation > 30 ? "#FFF200" : "#FF0000";
ctx.fillRect(212, 64, (196 * (carbonation / 100)), 16);
}

// 게임 오버 화면
if (gameOver) {
ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.fillStyle = "#FFFFFF";
ctx.font = "bold 36px 'Malgun Gothic'";
ctx.textAlign = "center";
ctx.fillText("김이 다 빠졌습니다!", canvas.width / 2, canvas.height / 2 - 40);

ctx.font = "24px 'Malgun Gothic'";
ctx.fillText(최종 점수:${score}`, canvas.width / 2, canvas.height / 2 + 10);

ctx.fillStyle = "#FFF200";
ctx.fillText("화면을 클릭하면 다시 시작합니다", canvas.width / 2, canvas.height / 2 + 70);
ctx.textAlign = "left"; // 원상복구
}

requestAnimationFrame(update);
}

// 게임 시작
update();
</script>

</body>
</html>
